name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-south2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: asia-south2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/xeno-backend/xeno-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy xeno-backend \
            --image=asia-south2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/xeno-backend/xeno-backend:latest \
            --region=asia-south2 \
            --platform=managed \
            --allow-unauthenticated
